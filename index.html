<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Mechanic Pro | Springfield, MO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 backdrop-blur-md bg-white/70 dark:bg-slate-900/70 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 font-bold text-xl">
                <i data-lucide="wrench" class="text-blue-600"></i>
                <span>Mobile<span class="text-blue-600">Mechanic</span></span>
            </div>
            <a href="#schedule" class="bg-blue-600 text-white px-5 py-2 rounded-full font-semibold hover:bg-blue-700 transition">Book Now</a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="pt-32 pb-16 px-4 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4">Expert Repairs, <span class="text-blue-600">In Your Driveway.</span></h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-8">Springfield's premier mobile mechanic. I bring the full shop experience to your doorstep.</p>
    </header>

    <!-- Scheduling Section -->
    <section id="schedule" class="py-12 px-4">
        <div class="max-w-3xl mx-auto bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i data-lucide="calendar"></i> Book a Diagnostic</h2>
            
            <!-- FORM UPDATED WITH YOUR UNIQUE ID -->
            <form action="https://formspree.io/f/mzdojyqr" method="POST" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Full Name</label>
                        <input type="text" name="name" placeholder="John Doe" required class="form-input">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Phone Number</label>
                        <input type="tel" name="phone" placeholder="(417) 555-0123" required class="form-input">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-1">What's the issue?</label>
                    <select name="issue" required class="form-input appearance-none">
                        <option value="I Don't Know">I Don't Know / Diagnostic Needed</option>
                        <option value="Brakes">Brakes (Squealing/Grinding)</option>
                        <option value="Engine Light">Engine Light / Rough Run</option>
                        <option value="Fluid Leak">Oil / Fluid Leak</option>
                        <option value="Battery/Starter">Battery / Alternator / Starter</option>
                        <option value="Other">Other (Describe below)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Additional Details</label>
                    <textarea name="message" placeholder="Year, Make, Model and what symptoms you're seeing..." rows="4" class="form-input"></textarea>
                </div>

                <!-- Anti-Spam Honeypot -->
                <input type="text" name="_gotcha" style="display:none">

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition transform active:scale-95">
                    Send Request to Mechanic
                </button>
            </form>
        </div>
    </section>

    <!-- Secure Payments -->
    <section id="pay" class="py-20 px-4 bg-slate-100 dark:bg-slate-900/50 text-center">
        <div class="max-w-xl mx-auto">
            <h2 class="text-2xl font-bold mb-2">Secure Invoice Payment</h2>
            <p class="text-slate-600 dark:text-slate-400 mb-8">All payments are processed via Stripe's encrypted gateway.</p>
            
            <!-- Replace the # with your actual Stripe/PayPal link when ready -->
            <a href="#" target="_blank" class="flex items-center justify-center gap-3 bg-slate-900 dark:bg-white dark:text-slate-900 text-white p-4 rounded-xl font-bold hover:opacity-90 transition">
                <i data-lucide="credit-card"></i> Pay Securely Online
            </a>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
